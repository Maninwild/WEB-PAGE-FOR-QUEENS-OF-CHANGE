<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Registration - Queens Of Change</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">Queens Of Change</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="index.html#about" class="nav-link">About Us</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">Dark Mode</button>
    </header>

    <main>
        <section class="form-section">
            <div class="form-container" id="formContainer">
                <h2>Volunteer Registration Form</h2>
                <p class="form-subtitle">Join our mission to create real impact. Fill out the details below and our team will get in touch with you shortly.</p>
                
                <form action="#" method="POST" class="volunteer-form" id="volunteerForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Manjunath" autocomplete="name" required />
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="manjunath@gmail.com" autocomplete="email" required />
                    </div>

                    <div class="form-group">
                        <label for="interest">Area of Interest</label>
                        <div class="select-wrapper">
                            <select id="interest" name="interest" required>
                                <option value="" disabled selected>Select your area</option>
                                <option value="mentorship">Technical Mentorship</option>
                                <option value="content">Content & Community Management</option>
                                <option value="events">Event Coordination</option>
                                <option value="marketing">Social Media & Marketing</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Why do you want to join Queens Of Change?</label>
                        <textarea id="message" name="message" rows="5" maxlength="500" placeholder="Tell us a little bit about yourself and your motivation..." required></textarea>
                        <span class="char-count" id="charCount">0 / 500 characters</span>
                    </div>

                    <button type="submit" class="cta-btn submit-btn" id="submitBtn">Submit Application</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Queens Of Change Foundation.</p>
    </footer>

    <script src="Script.js"></script>
</body>
</html>
